    <!-- Skip to content for accessibility -->
    <style>
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #1a56db;
        color: white;
        padding: 8px;
        z-index: 100;
        transition: top 0.3s;
      }
      .skip-link:focus {
        top: 0;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body class="bg-[#f9fafb] text-[#111827] font-sans antialiased transition-colors duration-300">
